name: (Internal) GPU ICX Windows
on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  build-windows-gpu:
    secrets: inherit
    uses: intel-innersource/libraries.devops.renderkit.workflows/.github/workflows/windows.yml@main
    with:
      force-delete: true    # guarantees .gitattributes are respected in working dir
      submodules: true
      runs-on: '[ "Windows", "build" ]'
      env-from-files: .github/deps/dpcpp-windows-icx.env
      msvc-version: 2022
      artifact-out: build-windows-gpu
      artifact-path: ./build
      artifact-on-failure: true
      cmd: |
        # disable warnings which lead to excessively large log files
        $env:CXXFLAGS = '-w'
        $env:CFLAGS = '-w'

        mkdir build
        cd build

        cmake -L -G Ninja -D CMAKE_INSTALL_LIBDIR=lib -D BUILD_OPENVKL_BENCHMARKS=OFF -D BUILD_OPENVKL_TESTING=ON -D BUILD_OPENVDB=OFF -D OPENVKL_EXTRA_OPTIONS="-DOPENVKL_ENABLE_DEVICE_GPU=ON -DOPENVKL_DEVICE_CPU_STRUCTURED_REGULAR=OFF -DOPENVKL_DEVICE_CPU_STRUCTURED_REGULAR_LEGACY=ON" ../superbuild

        cmake --build . --config Release --verbose


  test-windows-cpu:
    secrets: inherit
    needs: [ build-windows-gpu ]
    uses: intel-innersource/libraries.devops.renderkit.workflows/.github/workflows/windows.yml@main
    with:
      force-delete: true    # guarantees .gitattributes are respected in working dir
      submodules: true
      runs-on: '[ "Windows", "build" ]'
      env-from-files: .github/deps/dpcpp-windows-icx.env
      msvc-version: 2022
      artifact-in: build-windows-gpu
      cmd: |
        cd ./build/install/bin

        ./vklTutorialCPU
        ./vklTestsCPU

  test-windows-dg2:
    secrets: inherit
    needs: [ build-windows-gpu ]
    uses: intel-innersource/libraries.devops.renderkit.workflows/.github/workflows/windows.yml@main
    with:
      force-delete: true    # guarantees .gitattributes are respected in working dir
      submodules: true
      runs-on: '[ "Windows", "dg2" ]'
      env-from-files: .github/deps/dpcpp-windows-icx.env .github/deps/gfx-windows-public.env
      msvc-version: 2022
      artifact-in: build-windows-gpu
      cmd: |
        cd ./build/install/bin

        ./vklTutorialGPU
        ./vklTestsGPU --durations yes exclude:'Multiple devices'

  test-windows-bmg:
    secrets: inherit
    needs: [ build-windows-gpu ]
    uses: intel-innersource/libraries.devops.renderkit.workflows/.github/workflows/windows.yml@main
    with:
      force-delete: true    # guarantees .gitattributes are respected in working dir
      submodules: true
      runs-on: '[ "Windows", "bmg" ]'
      env-from-files: .github/deps/dpcpp-windows-icx.env .github/deps/gfx-windows-public.env
      msvc-version: 2022
      artifact-in: build-windows-gpu
      cmd: |
        cd ./build/install/bin

        ./vklTutorialGPU
        ./vklTestsGPU --durations yes exclude:'Multiple devices'

  test-windows-lnl:
    secrets: inherit
    needs: [ build-windows-gpu ]
    uses: intel-innersource/libraries.devops.renderkit.workflows/.github/workflows/windows.yml@main
    with:
      force-delete: true    # guarantees .gitattributes are respected in working dir
      submodules: true
      runs-on: '[ "Windows", "lnl" ]'
      env-from-files: .github/deps/dpcpp-windows-icx.env .github/deps/gfx-windows-public.env
      msvc-version: 2022
      artifact-in: build-windows-gpu
      cmd: |
        cd ./build/install/bin

        ./vklTutorialGPU
        ./vklTestsGPU --durations yes exclude:'Multiple devices'

  test-examples-windows-dg2:
    secrets: inherit
    needs: [ build-windows-gpu ]
    uses: intel-innersource/libraries.devops.renderkit.workflows/.github/workflows/windows.yml@main
    with:
      force-delete: true    # guarantees .gitattributes are respected in working dir
      submodules: true
      runs-on: '[ "Windows", "dg2" ]'
      env-from-files: .github/deps/dpcpp-windows-icx.env .github/deps/gfx-windows-public.env
      msvc-version: 2022
      artifact-in: build-windows-gpu
      artifact-out: test-examples-dg2
      artifact-path: ./build/install/bin/*.pfm
      artifact-on-failure: true
      cmd: |
        cd $env:GITHUB_WORKSPACE/build/install/bin
        python $env:GITHUB_WORKSPACE/.github/scripts/run-examples-tests.py "img_diff.exe"

  test-examples-windows-bmg:
    secrets: inherit
    needs: [ build-windows-gpu ]
    uses: intel-innersource/libraries.devops.renderkit.workflows/.github/workflows/windows.yml@main
    with:
      force-delete: true    # guarantees .gitattributes are respected in working dir
      submodules: true
      runs-on: '[ "Windows", "bmg" ]'
      env-from-files: .github/deps/dpcpp-windows-icx.env .github/deps/gfx-windows-public.env
      msvc-version: 2022
      artifact-in: build-windows-gpu
      artifact-out: test-examples-bmg
      artifact-path: ./build/install/bin/*.pfm
      artifact-on-failure: true
      cmd: |
        cd $env:GITHUB_WORKSPACE/build/install/bin
        python $env:GITHUB_WORKSPACE/.github/scripts/run-examples-tests.py "img_diff.exe"

  test-examples-windows-lnl:
    secrets: inherit
    needs: [ build-windows-gpu ]
    uses: intel-innersource/libraries.devops.renderkit.workflows/.github/workflows/windows.yml@main
    with:
      force-delete: true    # guarantees .gitattributes are respected in working dir
      submodules: true
      runs-on: '[ "Windows", "lnl" ]'
      env-from-files: .github/deps/dpcpp-windows-icx.env .github/deps/gfx-windows-public.env
      msvc-version: 2022
      artifact-in: build-windows-gpu
      artifact-out: test-examples-lnl
      artifact-path: ./build/install/bin/*.pfm
      artifact-on-failure: true
      cmd: |
        cd $env:GITHUB_WORKSPACE/build/install/bin
        python $env:GITHUB_WORKSPACE/.github/scripts/run-examples-tests.py "img_diff.exe"
